spring.profiles.active=dev

spring.application.name=cris-play

server.port=${PORT:8080}

server.servlet.context-path=/cris-play/api

# =========================
# DATABASE CONFIG
# =========================

spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=${DB_URL}

spring.datasource.username=${DB_USER}

spring.datasource.password=${DB_PASSWORD}

# =========================
# JPA / HIBERNATE
# =========================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# =========================
# LANGCHAIN4J / OLLAMA
# =========================

langchain4j.ollama.base-url=${OLLAMA_URL:http://localhost:11434}

langchain4j.ollama.model-name=tinyllama

langchain4j.ollama.model.log-requests=true

langchain4j.ollama.model.log-responses=true

# =========================
# LOGGING
# =========================

logging.level.dev.langchain4j=DEBUG

logging.level.dev.ai4j.langchain4j=DEBUG